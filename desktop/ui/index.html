<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conclave</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1d2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e2130;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #fff;
    }
    p {
      font-size: 0.9rem;
      color: #8892a4;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .form-group {
      text-align: left;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #8892a4;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input {
      width: 100%;
      background: #111420;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #5865f2; }
    input::placeholder { color: #4a5568; }
    button {
      width: 100%;
      background: #5865f2;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.8rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: #4752c4; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #3a3f5c; cursor: not-allowed; }
    .error {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #f04747;
      min-height: 1.2em;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏰</div>
    <h1>Conclave Desktop</h1>
    <p>Enter your Conclave instance URL to get started.<br>You'll sign in through the normal login page.</p>

    <form id="form">
      <div class="form-group">
        <label for="url">Instance URL</label>
        <input
          id="url"
          type="url"
          placeholder="https://conclave.yourserver.com"
          autocomplete="off"
          spellcheck="false"
          required
        />
      </div>
      <button type="submit" id="btn">Connect</button>
      <div class="error" id="error"></div>
    </form>

    <p class="hint">Your URL is saved locally and the window remembers it on future launches.</p>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const errEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('url').value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.textContent = 'Connecting…';
      errEl.textContent = '';

      try {
        await window.__TAURI__.core.invoke('configure', { url });
      } catch (err) {
        errEl.textContent = String(err);
        btn.disabled = false;
        btn.textContent = 'Connect';
      }
    });
  </script>
</body>
</html>
