<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conclave Presence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111113;
      color: #e0e0e0;
      padding: 1.5rem;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    h1 { font-size: 1.1rem; font-weight: 700; }
    .status { font-size: 0.85rem; color: #aaa; }
    .status.ok { color: #44c97d; }
    .status.err { color: #e04545; }
    .game { font-size: 0.85rem; color: #aaa; margin-top: 0.25rem; }
    button {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(255,255,255,0.1);
      color: #e0e0e0;
      margin-top: auto;
    }
    button:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <h1>Conclave Presence</h1>
  <p id="status" class="status">Loading…</p>
  <p id="game" class="game"></p>
  <button onclick="window.close()">Close to tray</button>

  <script type="module">
    import { invoke } from 'https://unpkg.com/@tauri-apps/api@2/core';

    async function refresh() {
      try {
        const cfg = await invoke('get_config');
        const el = document.getElementById('status');
        if (cfg.is_configured) {
          el.className = 'status ok';
          el.textContent = `● Connected to ${cfg.instance_url}`;
        } else {
          el.className = 'status err';
          el.textContent = '✕ Not connected — use "Connect installed app" in Conclave';
        }
      } catch (e) {
        document.getElementById('status').textContent = 'Error: ' + e;
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
