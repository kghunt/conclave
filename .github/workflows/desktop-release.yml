name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: conclave-presence-linux-x64.AppImage
            bundle_glob: "desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: conclave-presence-windows-x64.exe
            bundle_glob: "desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: conclave-presence-macos-x64.dmg
            bundle_glob: "desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: conclave-presence-macos-arm64.dmg
            bundle_glob: "desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: desktop

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Conclave Presence ${{ github.ref_name }}'
          releaseBody: |
            Desktop presence companion for Conclave.

            **Self-hosting:** copy the file for your platform into `./data/downloads/` on your server
            and Conclave will serve it directly to your users from Edit Profile.
          args: --target ${{ matrix.target }}

      # Rename to the canonical filename Conclave expects, then attach to the release.
      - name: Rename and upload asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          src=$(ls ${{ matrix.bundle_glob }} | head -1)
          cp "$src" "${{ matrix.asset_name }}"
          gh release upload ${{ github.ref_name }} "${{ matrix.asset_name }}" --clobber
