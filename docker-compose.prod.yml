services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: conclave
      POSTGRES_DB: conclave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conclave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/kghunt/conclave:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      STATIC_DIR: /app/public
      AVATAR_DIR: /data/avatars
      PORT: "8080"
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - avatar_data:/data/avatars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  avatar_data:
