services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: conclave
      POSTGRES_DB: conclave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conclave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/kghunt/conclave:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      STATIC_DIR: /app/public
      AVATAR_DIR: /data/avatars
      PORT: "8080"
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data/media:/data/avatars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /livekit.yaml
    environment:
      # Format: "LIVEKIT_KEY: LIVEKIT_SECRET" — both come from your .env file
      LIVEKIT_KEYS: "${LIVEKIT_KEY}: ${LIVEKIT_SECRET}"
    ports:
      - "7880:7880"      # WebSocket signaling — proxy through NPM
      - "7882:7882/udp"  # WebRTC media — forward directly, bypass NPM
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro

volumes:
  postgres_data:
  redis_data:
