services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conclave
      POSTGRES_PASSWORD: conclave
      POSTGRES_DB: conclave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conclave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://conclave:conclave@postgres:5432/conclave?sslmode=disable
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${BASE_URL:-http://localhost:8080}
      INSTANCE_ADMIN_EMAIL: ${INSTANCE_ADMIN_EMAIL:-}
      PORT: 8080
      STATIC_DIR: /app/public
      AVATAR_DIR: /data/avatars
    volumes:
      - ./data/media:/data/avatars
      - ./data/downloads:/data/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
